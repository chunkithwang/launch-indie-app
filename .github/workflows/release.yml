name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Validate Skill and generator
        run: python3 tests/test_skill.py
      - name: Build installable archive
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          cd skills
          zip -r "../dist/launch-indie-app-${TAG}.zip" launch-indie-app \
            -x "*/__pycache__/*" "*.pyc" ".DS_Store"
          cd ..
          sha256sum "dist/launch-indie-app-${TAG}.zip" \
            > "dist/launch-indie-app-${TAG}.zip.sha256"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "${TAG}" \
            "dist/launch-indie-app-${TAG}.zip#Installable Skill archive" \
            "dist/launch-indie-app-${TAG}.zip.sha256#SHA-256 checksum" \
            --generate-notes \
            --title "launch-indie-app ${TAG}"
